<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCT Image Compression Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #0b0f19;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.5);
            --success: #10b981;
            --img-bg: rgba(0, 0, 0, 0.3);
            --metric-bg: rgba(0, 0, 0, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-border: rgba(0, 0, 0, 0.1);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --img-bg: rgba(0, 0, 0, 0.05);
            --metric-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-blob-1 {
            position: absolute;
            top: -20%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(11, 15, 25, 0) 70%);
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        .bg-blob-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(11, 15, 25, 0) 70%);
            z-index: -1;
            animation: pulse 12s infinite alternate-reverse;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(20px, 20px);
            }
        }

        header {
            margin-top: 4rem;
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff47ff, #3b82f6, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Glassmorphism Panels */
        .panel {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--surface-border);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--accent-1);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        #file-input {
            display: none;
        }

        /* Controls */
        .controls {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .slider-container {
            flex-grow: 1;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: var(--surface-border);
            border-radius: 4px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: transform 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        button.btn-primary {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--accent-glow);
        }

        button.btn-primary:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--surface-border);
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            width: 100%;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent-1);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Results Section */
        #results-section {
            display: none;
            animation: fadeIn 0.8s ease-out;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--metric-bg);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--surface-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--success);
            margin-bottom: 0.5rem;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .image-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .image-title {
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            font-size: 1.2rem;
        }

        .image-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--surface-border);
            aspect-ratio: 1;
            background: var(--img-bg);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-wrapper:hover img {
            transform: scale(1.05);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #preview-wrapper {
            margin-top: 1rem;
            display: none;
            text-align: center;
        }

        #preview-img {
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
        }
    </style>
</head>

<body>

    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <button id="theme-toggle" style="position: absolute; top: 1.5rem; right: 2rem; background: var(--surface); border: 1px solid var(--surface-border); color: var(--text-primary); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-weight: 600; backdrop-filter: blur(5px); z-index: 10;">
        ☀️ Light Mode
    </button>

    <header>
        <h1>DCT Studio</h1>
        <p class="subtitle">Next-Generation Image Compression powered by Discrete Cosine Transform.</p>
    </header>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <span class="upload-icon">✨</span>
                <h3>Drag & Drop your image here</h3>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">or click to browse</p>
                <input type="file" id="file-input" accept="image/*">

                <div id="preview-wrapper">
                    <img id="preview-img" src="" alt="Preview">
                    <p style="color: var(--success); margin-top: 0.5rem;" id="file-name"></p>
                </div>
            </div>

            <div class="controls">
                <div class="slider-container">
                    <div class="slider-header">
                        <span>Quality Factor</span>
                        <span id="quality-val">50%</span>
                    </div>
                    <input type="range" id="quality-slider" min="1" max="100" value="50">
                </div>
                <button class="btn-primary" id="compress-btn">
                    <span id="btn-text">Compress Now</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="panel" id="results-section">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value" id="val-psnr">--</div>
                    <div class="metric-label">PSNR (dB)</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="val-mse">--</div>
                    <div class="metric-label">MSE</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="val-cr">--</div>
                    <div class="metric-label">Est. Ratio</div>
                </div>
            </div>

            <div class="images-grid">
                <div class="image-card">
                    <div class="image-title">Original (Grayscale)</div>
                    <div class="image-wrapper">
                        <img id="img-original" src="" alt="Original">
                    </div>
                </div>
                <div class="image-card">
                    <div class="image-title">Compressed & Reconstructed</div>
                    <div class="image-wrapper">
                        <img id="img-reconstructed" src="" alt="Reconstructed">
                    </div>
                    <button class="btn-secondary" id="download-btn">⬇ Download Compressed</button>
                </div>
                <div class="image-card">
                    <div class="image-title">Error Map (x5 Amplified)</div>
                    <div class="image-wrapper">
                        <img id="img-diff" src="" alt="Difference">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const slider = document.getElementById('quality-slider');
        const qualityVal = document.getElementById('quality-val');
        const compressBtn = document.getElementById('compress-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');

        const previewWrapper = document.getElementById('preview-wrapper');
        const previewImg = document.getElementById('preview-img');
        const fileNameDisplay = document.getElementById('file-name');

        let selectedFile = null;

        // Slider logic
        slider.addEventListener('input', (e) => {
            qualityVal.textContent = e.target.value + '%';
        });

        // Drag and drop logic
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function () {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                selectedFile = files[0];
                fileNameDisplay.textContent = selectedFile.name;

                // Show preview
                const reader = new FileReader();
                reader.onload = function (e) {
                    previewImg.src = e.target.result;
                    previewWrapper.style.display = 'block';
                }
                reader.readAsDataURL(selectedFile);

                // hide placeholder text
                dropZone.querySelector('h3').style.display = 'none';
                dropZone.querySelector('p').style.display = 'none';
                dropZone.querySelector('.upload-icon').style.display = 'none';
            }
        }

        // Compress Action
        compressBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                alert("Please select an image first!");
                return;
            }

            // UI Loading state
            btnText.style.opacity = '0';
            btnLoader.style.display = 'block';
            compressBtn.disabled = true;

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('quality', slider.value);

            try {
                const response = await fetch('/compress', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // Populate UI
                    document.getElementById('val-psnr').textContent = data.metrics.PSNR.toFixed(2);
                    document.getElementById('val-mse').textContent = data.metrics.MSE.toFixed(2);
                    document.getElementById('val-cr').textContent = data.compression_ratio + 'x';

                    document.getElementById('img-original').src = data.original;
                    document.getElementById('img-reconstructed').src = data.reconstructed;
                    document.getElementById('img-diff').src = data.difference;

                    document.getElementById('results-section').style.display = 'block';

                    // Scroll to results
                    setTimeout(() => {
                        document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("Request failed: " + err);
            } finally {
                // Reset UI Loading state
                btnText.style.opacity = '1';
                btnLoader.style.display = 'none';
                compressBtn.disabled = false;
            }
        });

        // Download Action
        const downloadBtn = document.getElementById('download-btn');
        downloadBtn.addEventListener('click', () => {
            const imgSrc = document.getElementById('img-reconstructed').src;
            if (imgSrc) {
                const a = document.createElement('a');
                a.href = imgSrc;
                // Get the current quality value from the UI
                const q = qualityVal.textContent.replace('%', '');
                a.download = `compressed_Q${q}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        });

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeToggle.textContent = '☀️ Light Mode';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeToggle.textContent = '🌙 Dark Mode';
            }
        });
    </script>
</body>

</html>
